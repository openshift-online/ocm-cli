version: "2"
run:
  modules-download-mode: readonly
  issues-exit-code: 1
linters:
  default: none
  enable:
    #- goconst
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    # https://redhat.atlassian.net/browse/OCM-24618
    #- staticcheck
    - unconvert
    - unused
  settings:
    goconst:
      min-len: 4
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
